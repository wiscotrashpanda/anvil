apiVersion: anvil.emkaytec.dev/v1alpha1
kind: GitHubTerraformRepository
metadata:
  name: sample-service
spec:
  repository:
    description: Terraform-managed sample service.
    visibility: private
    topics:
      - aws
      - terraform
    autoInit: true
    defaultBranch: main
    features:
      hasIssues: true
      hasProjects: false
      hasWiki: false
    mergePolicy:
      allowSquashMerge: true
      allowMergeCommit: false
      allowRebaseMerge: false
      deleteBranchOnMerge: true

  aws:
    region: us-east-1
    managedPolicyArns:
      - arn:aws:iam::aws:policy/ReadOnlyAccess
    stackSetPermissionModel: SELF_MANAGED
    stackSetCallAs: SELF
    retainStackInstancesOnDestroy: false
    tags:
      owner: platform
      service: sample-service

  environments:
    dev:
      aws:
        accountId: "111111111111"
        region: us-east-1
    staging:
      aws:
        accountId: "222222222222"
        region: us-east-1
    prod:
      aws:
        accountId: "333333333333"
        region: us-east-2
        managedPolicyArns:
          - arn:aws:iam::aws:policy/ReadOnlyAccess
          - arn:aws:iam::aws:policy/PowerUserAccess

  workspace:
    projectName: sample-service
    terraformVersion: "1.10.0"
    executionMode: remote
    autoApply: false
    queueAllRuns: true
    speculativeEnabled: true
    workingDirectory: terraform
    tags:
      owner: platform
      service: sample-service

    vcsRepo:
      branch: main
      githubAppInstallationId: 12345678
      triggerPrefixes:
        - terraform/

    manageVariables: true
