apiVersion: anvil.emkaytec.dev/v1alpha1
kind: HCPTerraformWorkspace
metadata:
  name: sample-service-dev
spec:
  githubRepository: emkaytec/sample-service
  environment: dev
  aws:
    accountId: "111111111111"
    region: us-east-1
    managedPolicyArns:
      - arn:aws:iam::aws:policy/ReadOnlyAccess
    stackSetPermissionModel: SELF_MANAGED
    stackSetCallAs: SELF
    retainStackInstancesOnDestroy: false
    tags:
      owner: platform
      environment: dev

  workspace:
    projectName: sample-service
    terraformVersion: "1.10.0"
    executionMode: remote
    autoApply: false
    queueAllRuns: true
    speculativeEnabled: true
    workingDirectory: terraform
    tags:
      owner: platform
      service: sample-service

    vcsRepo:
      branch: main
      githubAppInstallationId: 12345678
      triggerPrefixes:
        - terraform/

    manageVariables: true
